<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emre Düzel Barber Club</title>
    <style>
        :root { --gold: #d4af37; --dark: #121212; }
        body { background: var(--dark); color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        h1 { color: var(--gold); margin-bottom: 20px; }
        .saat-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; max-width: 500px; margin: 0 auto; }
        .saat-btn { border: 1px solid var(--gold); color: var(--gold); padding: 15px; background: none; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .dolu { background: #333 !important; color: #666 !important; border-color: #444 !important; cursor: not-allowed; text-decoration: line-through; }
    </style>
</head>
<body>

    <h1>EMRE DÜZEL BARBER CLUB</h1>
    <div id="saat-listesi" class="saat-container">Yükleniyor...</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyCFZEzsd1xQ9XVSEBM0ZxbGnoIK5k0m0lM",
            authDomain: "barber-otomasyonu.firebaseapp.com",
            databaseURL: "https://barber-otomasyonu-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "barber-otomasyonu",
            storageBucket: "barber-otomasyonu.appspot.com",
            messagingSenderId: "1063957385671",
            appId: "1:1063957385671:web:0ddca0040c2f0d2aa7c9e2"
        };

        firebase.initializeApp(firebaseConfig);
        var database = firebase.database();
        var bugun = new Date().toISOString().slice(0, 10);
        var dbRef = database.ref('randevular/' + bugun);

        dbRef.on('value', function(snapshot) {
            var doluSaatler = snapshot.val() ? Object.values(snapshot.val()) : [];
            var listeDiv = document.getElementById('saat-listesi');
            listeDiv.innerHTML = "";

            for (var h = 9; h < 20; h++) {
                var saatler = ["00", "45"];
                saatler.forEach(function(m) {
                    if (h === 19 && m === "45") return;
                    var saat = (h < 10 ? "0" + h : h) + ":" + m;
                    var btn = document.createElement('button');
                    btn.className = 'saat-btn';
                    btn.innerText = saat;

                    if (doluSaatler.indexOf(saat) !== -1) {
                        btn.className += ' dolu';
                        btn.disabled = true;
                    } else {
                        btn.onclick = function() {
                            if(confirm(saat + " randevusunu onaylıyor musunuz?")) {
                                dbRef.push(saat);
                                window.open("https://wa.me/905XXXXXXXXX?text=" + saat + " randevusu aldım.");
                            }
                        };
                    }
                    listeDiv.appendChild(btn);
                });
            }
        });
    </script>
</body>
</html>
