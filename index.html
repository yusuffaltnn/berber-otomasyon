<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCFZEzsd1xQ9XVSEBM0ZxbGnoIK5k0m0lM",
        authDomain: "barber-otomasyonu.firebaseapp.com",
        // SONUNDA SLASH OLMADAN DENE:
        databaseURL: "https://barber-otomasyonu-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "barber-otomasyonu",
        storageBucket: "barber-otomasyonu.appspot.com",
        messagingSenderId: "1063957385671",
        appId: "1:1063957385671:web:0ddca0040c2f0d2aa7c9e2"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    // Bağlantı testi için konsola yazdıralım
    console.log("Veritabanına bağlanılıyor...");

    const bugun = new Date().toISOString().slice(0, 10);
    const dbRef = database.ref('randevular/' + bugun);

    dbRef.on('value', (snapshot) => {
        console.log("Veri çekildi:", snapshot.val());
        const listeDiv = document.getElementById('saat-listesi');
        const doluSaatler = snapshot.val() ? Object.values(snapshot.val()) : [];
        listeDiv.innerHTML = ""; 

        for (let h = 9; h < 20; h++) {
            for (let m of ["00", "45"]) {
                if (h === 19 && m === "45") break; 
                let saat = (h < 10 ? "0"+h : h) + ":" + m;
                const btn = document.createElement('button');
                btn.className = 'saat-btn' + (doluSaatler.includes(saat) ? ' dolu' : '');
                btn.innerText = saat;
                if (!doluSaatler.includes(saat)) {
                    btn.onclick = () => { if(confirm(saat + " onaylıyor musun?")) dbRef.push(saat); };
                }
                listeDiv.appendChild(btn);
            }
        }
    }, (error) => {
        console.error("Firebase Hatası:", error);
        document.getElementById('saat-listesi').innerHTML = "Bağlantı Hatası: " + error.message;
    });
</script>
