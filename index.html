<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emre Düzel Barber Club</title>
    <style>
        :root { --gold: #d4af37; --dark-bg: #0f0f0f; --card-bg: #1a1a1a; }
        body { background: var(--dark-bg); color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 0; }
        header { padding: 30px; background: rgba(0,0,0,0.5); border-bottom: 1px solid #333; margin-bottom: 20px; }
        h1 { color: var(--gold); letter-spacing: 3px; margin: 0; }
        .sub { color: #888; font-size: 0.8rem; margin-top: 5px; letter-spacing: 2px; }
        .container { width: 90%; max-width: 500px; background: var(--card-bg); padding: 20px; border-radius: 15px; margin: 0 auto; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .saat-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 12px; margin-top: 20px; }
        .saat-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .saat-btn:hover:not(.dolu) { background: var(--gold); color: black; transform: translateY(-2px); }
        .dolu { background: #2a2a2a !important; color: #555 !important; border-color: #333 !important; text-decoration: line-through; cursor: not-allowed; }
    </style>
</head>
<body>

    <header>
        <h1>EMRE DÜZEL</h1>
        <div class="sub">BARBER CLUB & ESTETİK</div>
    </header>

    <div class="container">
        <div style="font-size: 0.9rem; color: #ccc;">Müsait bir randevu saati seçiniz:</div>
        <div id="saat-listesi" class="saat-container">
            <p style="color: #666; grid-column: 1/-1;">Yükleniyor...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCFZEzsd1xQ9XVSEBM0ZxbGnoIK5k0m0lM",
            authDomain: "barber-otomasyonu.firebaseapp.com",
            databaseURL: "https://barber-otomasyonu-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "barber-otomasyonu",
            storageBucket: "barber-otomasyonu.appspot.com",
            messagingSenderId: "1063957385671",
            appId: "1:1063957385671:web:0ddca0040c2f0d2aa7c9e2"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        const bugun = new Date().toISOString().slice(0, 10);
        const ref = db.ref('randevular/' + bugun);

        ref.on('value', (snap) => {
            const dolu = snap.val() ? Object.values(snap.val()) : [];
            const liste = document.getElementById('saat-listesi');
            liste.innerHTML = "";
            
            for (let h = 9; h < 20; h++) {
                for (let m of ["00", "45"]) {
                    if (h === 19 && m === "45") break;
                    let s = (h < 10 ? "0"+h : h) + ":" + m;
                    const b = document.createElement('button');
                    b.className = 'saat-btn' + (dolu.includes(s) ? ' dolu' : '');
                    b.innerText = s;
                    if (!dolu.includes(s)) {
                        b.onclick = () => { if(confirm(s + " randevusu onaylansın mı?")) ref.push(s); };
                    }
                    liste.appendChild(b);
                }
            }
        });
    </script>
</body>
</html>
