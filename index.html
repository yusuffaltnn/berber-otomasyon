<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emre Düzel Barber Club | Randevu</title>
    <style>
        /* Modern CSS Değişkenleri */
        :root {
            --gold: #d4af37;
            --gold-hover: #f1c40f;
            --dark-bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-gray: #a0a0a0;
        }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at center, #222 0%, #0f0f0f 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Üst Başlık Alanı */
        header {
            padding: 40px 20px;
            text-align: center;
            width: 100%;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
            background: rgba(0,0,0,0.5);
        }

        h1 {
            color: var(--gold);
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .sub-title {
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        /* Saat Konteynırı */
        .container {
            width: 90%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #222;
        }

        .instruction {
            margin-bottom: 25px;
            color: #fff;
            font-weight: 300;
        }

        .saat-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 15px;
        }

        /* Buton Tasarımları */
        .saat-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 15px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        .saat-btn:hover:not(.dolu) {
            background: var(--gold);
            color: black;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .saat-btn:active {
            transform: translateY(0);
        }

        /* Dolu Saatler */
        .dolu {
            background: #2a2a2a !important;
            border-color: #333 !important;
            color: #555 !important;
            cursor: not-allowed;
            text-decoration: line-through;
            opacity: 0.6;
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding: 30px;
            color: #444;
            font-size: 0.8rem;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>EMRE DÜZEL</h1>
        <div class="sub-title">BARBER CLUB & ESTETİK</div>
    </header>

    <div class="container">
        <p class="instruction">Müsait bir randevu saati seçiniz:</p>
        <div id="saat-listesi" class="saat-container">
            </div>
    </div>

    <footer>
        &copy; 2026 Emre Düzel Barber Club. Tüm hakları saklıdır.
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCFZEzsd1xQ9XVSEBM0ZxbGnoIK5k0m0lM",
            authDomain: "barber-otomasyonu.firebaseapp.com",
            databaseURL: "https://barber-otomasyonu-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "barber-otomasyonu",
            storageBucket: "barber-otomasyonu.appspot.com",
            messagingSenderId: "1063957385671",
            appId: "1:1063957385671:web:0ddca0040c2f0d2aa7c9e2"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const bugun = new Date().toISOString().slice(0, 10);
        const ref = db.ref('randevular/' + bugun);

        ref.on('value', (snap) => {
            const dolu = snap.val() ? Object.values(snap.val()) : [];
            const liste = document.getElementById('saat-listesi');
            liste.innerHTML = "";
            
            for (let h = 9; h < 20; h++) {
                for (let m of ["00", "45"]) {
                    if (h === 19 && m === "45") break;
                    let s = (h < 10 ? "0"+h : h) + ":" + m;
                    const b = document.createElement('button');
                    b.className = 'saat-btn' + (dolu.includes(s) ? ' dolu' : '');
                    b.innerText = s;
                    if (!dolu.includes(s)) {
                        b.onclick = () => { 
                            if(confirm(s + " saati için randevu oluşturulsun mu?")) {
                                ref.push(s);
                            }
                        };
                    }
                    liste.appendChild(b);
                }
            }
        });
    </script>
</body>
</html>
